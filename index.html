<!DOCTYPE html>
<html lang="en" data-theme="dark" data-palette="emerald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light mode defaults */
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-glow: rgba(0, 113, 227, 0.15);
      --accent-soft: #f0f7ff;
      --border: #e5e5e7;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    /* Dark mode */
    [data-theme="dark"] {
      --bg: #0a0a0a;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #86868b;
      --border: #2c2c2e;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    /* Dark mode accent-soft for each palette */
    [data-theme="dark"][data-palette="blue"] { --accent-soft: rgba(0, 113, 227, 0.25); }
    [data-theme="dark"][data-palette="purple"] { --accent-soft: rgba(139, 92, 246, 0.25); }
    [data-theme="dark"][data-palette="rose"] { --accent-soft: rgba(225, 29, 72, 0.25); }
    [data-theme="dark"][data-palette="emerald"] { --accent-soft: rgba(16, 185, 129, 0.25); }
    [data-theme="dark"][data-palette="amber"] { --accent-soft: rgba(245, 158, 11, 0.25); }

    /* Color Palettes */
    [data-palette="blue"] {
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-glow: rgba(0, 113, 227, 0.15);
      --accent-soft: #f0f7ff;
      --accent-rgb: 0, 113, 227;
    }
    [data-palette="purple"] {
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent-glow: rgba(139, 92, 246, 0.15);
      --accent-soft: #f5f3ff;
      --accent-rgb: 139, 92, 246;
    }
    [data-palette="rose"] {
      --accent: #e11d48;
      --accent-hover: #be123c;
      --accent-glow: rgba(225, 29, 72, 0.15);
      --accent-soft: #fff1f2;
      --accent-rgb: 225, 29, 72;
    }
    [data-palette="emerald"] {
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-glow: rgba(16, 185, 129, 0.15);
      --accent-soft: #ecfdf5;
      --accent-rgb: 16, 185, 129;
    }
    [data-palette="amber"] {
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --accent-glow: rgba(245, 158, 11, 0.15);
      --accent-soft: #fffbeb;
      --accent-rgb: 245, 158, 11;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 60px 24px;
      line-height: 1.5;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 400;
    }

    .input-section {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text);
      transition: var(--transition);
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input[type="text"]::placeholder {
      color: var(--text-secondary);
    }

    .btn-push {
      padding: 16px 28px;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-push:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
    }

    .btn-push:active {
      transform: scale(0.98);
    }

    .stack-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .stack-label span {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stack-count {
      background: var(--border);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task:hover {
      box-shadow: var(--shadow-hover);
    }

    .task.top {
      border: 2px solid var(--accent);
      background: var(--accent-soft);
      animation: slideIn 0.3s ease-out, pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: var(--shadow), 0 0 0 0 var(--accent-glow);
      }
      50% {
        box-shadow: var(--shadow), 0 0 20px 4px var(--accent-glow);
      }
    }

    .task-index {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .task.top .task-index {
      background: var(--accent);
      color: white;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-weight: 500;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task.top .task-name::after {
      content: ' — now';
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 400;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: var(--transition);
    }

    .task:hover .task-actions {
      opacity: 1;
    }

    .task-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-secondary);
    }

    .task-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .task-btn.delete:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    .task-btn.complete:hover {
      background: #dcfce7;
      color: #16a34a;
    }

    .task-btn svg {
      width: 16px;
      height: 16px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    .keyboard-hint {
      text-align: center;
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .keyboard-hint kbd {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-family: inherit;
      font-size: 0.75rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      padding-bottom: 80px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--accent);
    }

    .task-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Floating Settings */
    .floating-settings {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      z-index: 100;
    }

    .settings-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-hover);
      display: none;
      flex-direction: column;
      gap: 16px;
      min-width: 200px;
    }

    .settings-panel.open {
      display: flex;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .settings-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .palette-options {
      display: flex;
      gap: 6px;
    }

    .palette-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition);
    }

    .palette-btn:hover {
      transform: scale(1.15);
    }

    .palette-btn.active {
      border-color: var(--text);
    }

    .palette-btn[data-color="blue"] { background: #0071e3; }
    .palette-btn[data-color="purple"] { background: #8b5cf6; }
    .palette-btn[data-color="rose"] { background: #e11d48; }
    .palette-btn[data-color="emerald"] { background: #10b981; }
    .palette-btn[data-color="amber"] { background: #f59e0b; }

    .theme-toggle {
      width: 28px;
      height: 28px;
      border: none;
      background: var(--bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-secondary);
    }

    .theme-toggle:hover {
      background: var(--border);
      color: var(--text);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    .fab {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--card-bg);
      box-shadow: var(--shadow-hover);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-secondary);
    }

    .fab:hover {
      transform: scale(1.05);
      color: var(--text);
    }

    .fab svg {
      width: 20px;
      height: 20px;
    }

    /* Bottom bar for archive */
    .bottom-bar {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
    }

    .archive-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .archive-btn:hover {
      color: var(--text);
      box-shadow: var(--shadow-hover);
    }

    .archive-btn svg {
      width: 16px;
      height: 16px;
    }

    .archive-count {
      background: var(--border);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .modal-close:hover {
      background: var(--border);
      color: var(--text);
    }

    .modal-close svg {
      width: 18px;
      height: 18px;
    }

    .modal-body {
      padding: 16px 24px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .archive-item {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .archive-item-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .archive-item-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .archive-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    @media (max-width: 480px) {
      body {
        padding: 40px 16px;
      }
      
      .input-section {
        flex-direction: column;
      }
      
      .btn-push {
        width: 100%;
      }
      
      .task-actions {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Stack Tasks</h1>
      <p class="subtitle">Focus on what's on top. Complete and return.</p>
    </header>

    <div class="input-section">
      <div class="input-wrapper">
        <input type="text" id="taskInput" placeholder="What needs your attention?" autofocus>
      </div>
      <button class="btn-push" onclick="pushTask()">Push</button>
    </div>

    <div class="stack-label">
      <span>Stack</span>
      <span class="stack-count" id="stackCount">0</span>
    </div>

    <div class="stack" id="stack"></div>

    <div class="keyboard-hint">
      Press <kbd>Enter</kbd> to push · <kbd>⌘ Enter</kbd> to pop top
    </div>

    <footer class="footer">
      Made by Robin Gautam · <a href="https://github.com/r0b1nz" target="_blank">GitHub</a> · <a href="mailto:robin.gautam341@gmail.com">robin.gautam341@gmail.com</a>
    </footer>
  </div>

  <!-- Floating Settings -->
  <div class="floating-settings">
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-row">
        <span class="settings-label">Theme</span>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <div class="settings-row">
        <span class="settings-label">Color</span>
        <div class="palette-options">
          <button class="palette-btn active" data-color="blue" onclick="setPalette('blue')" title="Blue"></button>
          <button class="palette-btn" data-color="purple" onclick="setPalette('purple')" title="Purple"></button>
          <button class="palette-btn" data-color="rose" onclick="setPalette('rose')" title="Rose"></button>
          <button class="palette-btn" data-color="emerald" onclick="setPalette('emerald')" title="Emerald"></button>
          <button class="palette-btn" data-color="amber" onclick="setPalette('amber')" title="Amber"></button>
        </div>
      </div>
    </div>
    <button class="fab" onclick="toggleSettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <!-- Archive Button -->
  <div class="bottom-bar">
    <button class="archive-btn" onclick="openArchive()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>
      </svg>
      Archive
      <span class="archive-count" id="archiveCount">0</span>
    </button>
  </div>

  <!-- Archive Modal -->
  <div class="modal-overlay" id="archiveModal" onclick="closeArchive(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Completed Tasks</h2>
        <button class="modal-close" onclick="closeArchive()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="archiveList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'stack-tasks';
    const ARCHIVE_KEY = 'stack-archive';
    const THEME_KEY = 'stack-theme';
    const PALETTE_KEY = 'stack-palette';
    let tasks = [];
    let archive = [];

    // Theme Management
    function loadPreferences() {
      const theme = localStorage.getItem(THEME_KEY) || 'dark';
      const palette = localStorage.getItem(PALETTE_KEY) || 'emerald';
      applyTheme(theme);
      applyPalette(palette);
    }

    function toggleTheme() {
      const current = document.documentElement.dataset.theme;
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem(THEME_KEY, newTheme);
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      document.querySelectorAll('.sun-icon').forEach(el => el.style.display = theme === 'dark' ? 'none' : 'block');
      document.querySelectorAll('.moon-icon').forEach(el => el.style.display = theme === 'dark' ? 'block' : 'none');
    }

    function setPalette(palette) {
      applyPalette(palette);
      localStorage.setItem(PALETTE_KEY, palette);
    }

    function applyPalette(palette) {
      document.documentElement.dataset.palette = palette;
      document.querySelectorAll('.palette-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color === palette);
      });
    }

    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('open');
    }

    // Load from localStorage
    function loadTasks() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          tasks = JSON.parse(stored);
        } catch (e) {
          tasks = [];
        }
      }
      const storedArchive = localStorage.getItem(ARCHIVE_KEY);
      if (storedArchive) {
        try {
          archive = JSON.parse(storedArchive);
        } catch (e) {
          archive = [];
        }
      }
      // Start timer for top task if exists
      if (tasks.length > 0 && !tasks[0].lastBecameTop) {
        tasks[0].lastBecameTop = Date.now();
        saveTasks();
      }
      render();
      updateArchiveCount();
    }

    // Save to localStorage
    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function saveArchive() {
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));
    }

    // Update time for current top task before any change
    function updateTopTaskTime() {
      if (tasks.length > 0 && tasks[0].lastBecameTop) {
        const elapsed = Date.now() - tasks[0].lastBecameTop;
        tasks[0].timeOnTop = (tasks[0].timeOnTop || 0) + elapsed;
        tasks[0].lastBecameTop = null;
      }
    }

    // Mark new top task as active
    function markNewTopTask() {
      if (tasks.length > 0) {
        tasks[0].lastBecameTop = Date.now();
      }
    }

    // Format time for display
    function formatTime(ms) {
      if (!ms || ms < 0) return '';
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      } else if (minutes > 0) {
        return `${minutes}m`;
      } else {
        return '<1m';
      }
    }

    // Get current elapsed time for a task
    function getCurrentTime(task, isTop) {
      let total = task.timeOnTop || 0;
      if (isTop && task.lastBecameTop) {
        total += Date.now() - task.lastBecameTop;
      }
      return total;
    }

    // Push new task to top
    function pushTask() {
      const input = document.getElementById('taskInput');
      const name = input.value.trim();
      if (!name) return;
      
      updateTopTaskTime();
      
      tasks.unshift({
        id: Date.now(),
        name: name,
        createdAt: new Date().toISOString(),
        timeOnTop: 0,
        lastBecameTop: Date.now()
      });
      
      input.value = '';
      saveTasks();
      render();
      input.focus();
    }

    // Pop top task (archive it)
    function popTask() {
      if (tasks.length === 0) return;
      updateTopTaskTime();
      
      const completed = tasks.shift();
      completed.completedAt = new Date().toISOString();
      archive.unshift(completed);
      
      markNewTopTask();
      saveTasks();
      saveArchive();
      render();
      updateArchiveCount();
    }

    // Remove specific task (not archive, just delete)
    function removeTask(id) {
      const index = tasks.findIndex(t => t.id === id);
      if (index === 0) {
        updateTopTaskTime();
      }
      tasks = tasks.filter(t => t.id !== id);
      if (index === 0) {
        markNewTopTask();
      }
      saveTasks();
      render();
    }

    // Move task up (towards top)
    function moveUp(index) {
      if (index === 0) return;
      
      if (index === 1) {
        // Task becoming top
        updateTopTaskTime();
      }
      
      [tasks[index - 1], tasks[index]] = [tasks[index], tasks[index - 1]];
      
      if (index === 1) {
        markNewTopTask();
      }
      
      saveTasks();
      render();
    }

    // Move task down (away from top)
    function moveDown(index) {
      if (index === tasks.length - 1) return;
      
      if (index === 0) {
        updateTopTaskTime();
      }
      
      [tasks[index], tasks[index + 1]] = [tasks[index + 1], tasks[index]];
      
      if (index === 0) {
        markNewTopTask();
      }
      
      saveTasks();
      render();
    }

    // Render the stack
    function render() {
      const stack = document.getElementById('stack');
      const count = document.getElementById('stackCount');
      count.textContent = tasks.length;

      if (tasks.length === 0) {
        stack.innerHTML = `
          <div class="empty-state">
            <div class="icon">○</div>
            <p>Your stack is empty.<br>Add a task to begin.</p>
          </div>
        `;
        return;
      }

      stack.innerHTML = tasks.map((task, index) => {
        const isTop = index === 0;
        const timeStr = formatTime(getCurrentTime(task, isTop));
        return `
          <div class="task ${isTop ? 'top' : ''}" data-id="${task.id}">
            <div class="task-index">${isTop ? '▸' : index}</div>
            <div class="task-content">
              <div class="task-name">${escapeHtml(task.name)}</div>
              ${timeStr ? `<div class="task-time">${isTop ? 'Active: ' : ''}${timeStr}</div>` : ''}
            </div>
            <div class="task-actions">
              ${index > 0 ? `
                <button class="task-btn" onclick="moveUp(${index})" title="Move up">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 15l-6-6-6 6"/>
                  </svg>
                </button>
              ` : ''}
              ${index < tasks.length - 1 ? `
                <button class="task-btn" onclick="moveDown(${index})" title="Move down">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9l6 6 6-6"/>
                  </svg>
                </button>
              ` : ''}
              ${isTop ? `
                <button class="task-btn complete" onclick="popTask()" title="Complete (pop)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 6L9 17l-5-5"/>
                  </svg>
                </button>
              ` : `
                <button class="task-btn delete" onclick="removeTask(${task.id})" title="Remove">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                  </svg>
                </button>
              `}
            </div>
          </div>
        `;
      }).join('');
    }

    // Archive functions
    function updateArchiveCount() {
      document.getElementById('archiveCount').textContent = archive.length;
    }

    function openArchive() {
      const list = document.getElementById('archiveList');
      if (archive.length === 0) {
        list.innerHTML = '<div class="archive-empty">No completed tasks yet.</div>';
      } else {
        list.innerHTML = archive.map(task => `
          <div class="archive-item">
            <div class="archive-item-name">${escapeHtml(task.name)}</div>
            <div class="archive-item-meta">
              Completed: ${new Date(task.completedAt).toLocaleDateString()} · 
              Time spent: ${formatTime(task.timeOnTop) || '<1m'}
            </div>
          </div>
        `).join('');
      }
      document.getElementById('archiveModal').classList.add('open');
    }

    function closeArchive(e) {
      if (!e || e.target === e.currentTarget) {
        document.getElementById('archiveModal').classList.remove('open');
      }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.metaKey && !e.ctrlKey) {
        if (document.activeElement.id === 'taskInput') {
          e.preventDefault();
          pushTask();
        }
      }
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        popTask();
      }
      if (e.key === 'Escape') {
        closeArchive();
        document.getElementById('settingsPanel').classList.remove('open');
      }
    });

    // Update time display every minute
    setInterval(() => {
      if (tasks.length > 0) {
        render();
      }
    }, 60000);

    // Initialize
    loadPreferences();
    loadTasks();
  </script>
</body>
</html>
